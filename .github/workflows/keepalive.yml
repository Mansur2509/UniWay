name: Keep backend warm

# The backend runs on Render's free tier, which spins the service down after
# ~15 minutes of inactivity. The first request after a spin-down is a cold start
# that can take up to ~60-90s. This workflow pings the health endpoint on a
# schedule so the service stays warm during active hours, which removes the
# cold-start delay for real users most of the time.
#
# Caveats (documented honestly):
#   - GitHub's scheduled cron is best-effort and can be delayed several minutes
#     under load, so this reduces — but does not perfectly guarantee zero —
#     cold starts.
#   - GitHub disables scheduled workflows on repositories with no activity for
#     60 days; a commit re-enables them.
#   - For a stronger guarantee, use an external uptime monitor (UptimeRobot,
#     cron-job.org) or upgrade Render to a paid tier (see docs/OPERATIONS.md).

on:
  schedule:
    # Every 10 minutes. Render free spins down after ~15 min idle, so a 10-min
    # ping keeps it warm with margin.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}

permissions: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping health endpoint
        run: |
          echo "Pinging backend health endpoint..."
          # Measured cold starts have taken up to ~145s, so --max-time must clear
          # that with margin. The job's purpose is to send the wake-up request;
          # A slow-but-eventual 200 is success. A timeout or non-200 fails the
          # workflow so this job also acts as a visible availability signal.
          code=$(curl -s -o /dev/null -w "%{http_code}" --max-time 170 \
            https://eduverse-vvw2.onrender.com/api/v1/health/ || echo "000")
          echo "Health endpoint returned HTTP $code"
          if [ "$code" != "200" ]; then
            echo "Unexpected status $code after the cold-start allowance."
            exit 1
          fi
