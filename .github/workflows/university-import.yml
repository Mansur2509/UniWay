name: University workbook import

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Import mode"
        type: choice
        required: true
        default: dry_run
        options:
          - dry_run
          - commit
      dataset_path:
        description: "Repository-relative dataset path"
        type: string
        required: true
      sheets:
        description: "Optional comma-separated worksheet names"
        type: string
        required: false
        default: ""
      limit:
        description: "Optional total row limit"
        type: string
        required: false
        default: ""
      missing_only:
        description: "Fill only missing fields"
        type: boolean
        required: true
        default: true
      list_sheets:
        description: "List workbook sheets without importing"
        type: boolean
        required: true
        default: false

permissions:
  contents: read

jobs:
  import:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
      DJANGO_SETTINGS_MODULE: config.settings
      IMPORT_AUDIT_OUT: import_audit.csv
      IMPORT_MANUAL_REVIEW_OUT: manual_review.csv
      INPUT_MODE: ${{ inputs.mode }}
      INPUT_DATASET_PATH: ${{ inputs.dataset_path }}
      INPUT_SHEETS: ${{ inputs.sheets }}
      INPUT_LIMIT: ${{ inputs.limit }}
      INPUT_MISSING_ONLY: ${{ inputs.missing_only }}
      INPUT_LIST_SHEETS: ${{ inputs.list_sheets }}
    steps:
      - name: Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: Set up Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5.6.0
        with:
          python-version: "3.12"

      - name: Install backend dependencies
        working-directory: backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-dev.txt

      - name: Diagnostics
        working-directory: backend
        run: |
          python --version
          python manage.py check
          test -n "$DATABASE_URL"

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate --noinput

      - name: Validate inputs and run requested operation
        working-directory: backend
        shell: bash
        run: |
          set -euo pipefail

          case "$INPUT_MODE" in
            dry_run|commit) ;;
            *) echo "Invalid mode" >&2; exit 2 ;;
          esac
          case "$INPUT_MISSING_ONLY" in
            true|false) ;;
            *) echo "Invalid missing_only value" >&2; exit 2 ;;
          esac
          case "$INPUT_LIST_SHEETS" in
            true|false) ;;
            *) echo "Invalid list_sheets value" >&2; exit 2 ;;
          esac
          if [[ -n "$INPUT_LIMIT" && ! "$INPUT_LIMIT" =~ ^[1-9][0-9]{0,5}$ ]]; then
            echo "Limit must be a positive integer no larger than six digits" >&2
            exit 2
          fi
          if [[ -z "$INPUT_DATASET_PATH" || "$INPUT_DATASET_PATH" == /* || "$INPUT_DATASET_PATH" == *".."* || "$INPUT_DATASET_PATH" == *\\* ]]; then
            echo "Dataset path must be a repository-relative path without traversal" >&2
            exit 2
          fi
          if [[ "$INPUT_SHEETS" == *$'\n'* || ${#INPUT_SHEETS} -gt 500 ]]; then
            echo "Sheets input is invalid or too long" >&2
            exit 2
          fi

          repo_root="$(realpath ..)"
          dataset_path="$(realpath -m "../$INPUT_DATASET_PATH")"
          case "$dataset_path" in
            "$repo_root"/*) ;;
            *) echo "Dataset path escaped the repository" >&2; exit 2 ;;
          esac
          if [[ ! -f "$dataset_path" ]]; then
            echo "Dataset file does not exist in the checked-out repository" >&2
            exit 2
          fi

          if [[ "$INPUT_LIST_SHEETS" == "true" ]]; then
            python manage.py import_universities_data "$dataset_path" --list-sheets
            exit 0
          fi

          mode_flag="--dry-run"
          if [[ "$INPUT_MODE" == "commit" ]]; then
            mode_flag="--commit"
          fi

          missing_flag=""
          if [[ "$INPUT_MISSING_ONLY" == "true" ]]; then
            missing_flag="--missing-only"
          fi

          sheets_flag=()
          if [[ -n "$INPUT_SHEETS" ]]; then
            sheets_flag=(--sheets "$INPUT_SHEETS")
          fi

          limit_flag=()
          if [[ -n "$INPUT_LIMIT" ]]; then
            limit_flag=(--limit "$INPUT_LIMIT")
          fi

          python manage.py import_universities_data "$dataset_path" \
            "$mode_flag" \
            $missing_flag \
            "${sheets_flag[@]}" \
            "${limit_flag[@]}" \
            --audit-out "$IMPORT_AUDIT_OUT" \
            --manual-review-out "$IMPORT_MANUAL_REVIEW_OUT"

      - name: Upload import artifacts
        if: ${{ always() && !inputs.list_sheets }}
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: university-import-audit
          path: |
            backend/import_audit.csv
            backend/manual_review.csv
          if-no-files-found: ignore
